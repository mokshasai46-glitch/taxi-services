<!DOCTYPE html>
<html>

<head>
    <title>Add Service</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            padding: 40px;
        }
        
        h1 {
            color: gold;
        }
        
        form {
            display: flex;
            flex-direction: column;
            max-width: 500px;
        }
        
        input, textarea, button {
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-family: Arial;
        }
        
        input, textarea {
            background: #222;
            color: white;
        }
        
        input::placeholder, textarea::placeholder {
            color: #999;
        }
        
        button {
            background: gold;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        a {
            color: gold;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Add Service</h1>

    <form method="POST">

        <input
            type="text"
            name="title"
            placeholder="Service Name"
            required>

        <textarea
            name="description"
            placeholder="Service Description"
            rows="5"
            required></textarea>

        <button type="submit">
            Save Service
        </button>

    </form>
    
    <a href="/admin">← Back to Dashboard</a>

</body>

</html>
